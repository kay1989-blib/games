<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verstop & Raad</title>

<style>
    body{
        font-family: Arial;
        background:#f2f2f2;
        text-align:center;
    }

    .container{
        display:flex;
        justify-content:center;
        gap:60px;
        margin-top:20px;
    }

    .bord{
        display:grid;
        grid-template-columns:repeat(5,70px);
        gap:8px;
    }

    .vak{
        width:70px;
        height:70px;
        background:#4da6ff;
        border-radius:10px;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:28px;
        color:white;
    }

    .goed{
        background:green !important;
    }

    .fout{
        background:red !important;
    }

    button{
        margin-top:20px;
        padding:10px 20px;
        border:none;
        border-radius:8px;
        background:#333;
        color:white;
        font-size:16px;
        cursor:pointer;
    }
</style>
</head>

<body>

<h1>🎯 Verstop & Raad</h1>

<h2 id="tekst">Team 1 verstopt 3 plekken</h2>

<div class="container">

    <div>
        <h3>Team 1 Bord</h3>
        <div id="bord1" class="bord"></div>
    </div>

    <div>
        <h3>Team 2 Bord</h3>
        <div id="bord2" class="bord"></div>
    </div>

</div>

<button onclick="nieuwSpel()">Nieuw Spel</button>

<script>

const bord1 = document.getElementById("bord1");
const bord2 = document.getElementById("bord2");
const tekst = document.getElementById("tekst");

let team1Plekken = [];
let team2Plekken = [];

let team1Gevonden = 0;
let team2Gevonden = 0;

let beurt = "team1verstop";

// Maak bord
function maakBord(bord, team){

    bord.innerHTML = "";

    for(let i=0; i<25; i++){

        let vak = document.createElement("div");
        vak.className = "vak";

        vak.onclick = function(){
            klikVak(team, i, vak);
        };

        bord.appendChild(vak);
    }
}

// Klik systeem
function klikVak(team, index, vak){

    // TEAM 1 VERSTOPT
    if(beurt === "team1verstop" && team === 1){

        if(!team1Plekken.includes(index)){

            team1Plekken.push(index);

            if(team1Plekken.length === 3){

                beurt = "team2verstop";

                tekst.innerHTML =
                "Team 2 verstopt 3 plekken";
            }
        }
    }

    // TEAM 2 VERSTOPT
    else if(beurt === "team2verstop" && team === 2){

        if(!team2Plekken.includes(index)){

            team2Plekken.push(index);

            if(team2Plekken.length === 3){

                beurt = "team1raad";

                tekst.innerHTML =
                "🔍 Team 1 moet zoeken op Team 2 bord";
            }
        }
    }

    // TEAM 1 RAADT
    else if(beurt === "team1raad" && team === 2){

        if(team2Plekken.includes(index)){

            vak.classList.add("goed");
            vak.innerHTML = "✅";

            team1Gevonden++;

            if(team1Gevonden === 3){

                tekst.innerHTML =
                "🏆 Team 1 wint!";
                
                beurt = "einde";
            }
            else{

                beurt = "team2raad";

                tekst.innerHTML =
                "Goed! Team 2 is aan de beurt";
            }
        }
        else{

            vak.classList.add("fout");
            vak.innerHTML = "❌";

            beurt = "team2raad";

            tekst.innerHTML =
            "Fout! Team 2 is aan de beurt";
        }
    }

    // TEAM 2 RAADT
    else if(beurt === "team2raad" && team === 1){

        if(team1Plekken.includes(index)){

            vak.classList.add("goed");
            vak.innerHTML = "✅";

            team2Gevonden++;

            if(team2Gevonden === 3){

                tekst.innerHTML =
                "🏆 Team 2 wint!";

                beurt = "einde";
            }
            else{

                beurt = "team1raad";

                tekst.innerHTML =
                "Goed! Team 1 is aan de beurt";
            }
        }
        else{

            vak.classList.add("fout");
            vak.innerHTML = "❌";

            beurt = "team1raad";

            tekst.innerHTML =
            "Fout! Team 1 is aan de beurt";
        }
    }
}

// Nieuw spel
function nieuwSpel(){

    team1Plekken = [];
    team2Plekken = [];

    team1Gevonden = 0;
    team2Gevonden = 0;

    beurt = "team1verstop";

    tekst.innerHTML =
    "Team 1 verstopt 3 plekken";

    maakBord(bord1, 1);
    maakBord(bord2, 2);
}

nieuwSpel();

</script>

</body>
</html>
