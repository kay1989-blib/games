<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Minesweeper</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f0f0f0;
}

h1{
    margin-top:20px;
}

#status{
    font-size:24px;
    margin:15px;
    min-height:30px;
}

#board{
    display:grid;
    grid-template-columns:repeat(10,40px);
    gap:2px;
    justify-content:center;
}

.cell{
    width:40px;
    height:40px;
    background:#c0c0c0;
    border:2px solid #999;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

.revealed{
    background:#e8e8e8;
    border:1px solid #bbb;
}

.flag{
    background:#c0c0c0;
}

.safeHint{
    background:lime !important;
}

.mineHint{
    background:red !important;
}

.n1{color:blue;}
.n2{color:green;}
.n3{color:red;}
.n4{color:darkblue;}
.n5{color:brown;}
.n6{color:turquoise;}
.n7{color:black;}
.n8{color:gray;}
</style>
</head>

<body>

<h1>Minesweeper</h1>

<div id="status"></div>
<div id="board"></div>

<script>
const SIZE = 10;
const MINES = 15;

let board = [];
let gameOver = false;
let cheat = false;
let firstClick = true;
let opened = 0;
let safeCells = SIZE * SIZE - MINES;

const boardDiv = document.getElementById("board");
const statusDiv = document.getElementById("status");

function createBoard(){

    board = [];
    gameOver = false;
    firstClick = true;
    opened = 0;

    for(let i=0;i<SIZE*SIZE;i++){
        board.push({
            mine:false,
            revealed:false,
            flagged:false
        });
    }

    let placed = 0;

    while(placed < MINES){
        const pos = Math.floor(Math.random()*board.length);

        if(!board[pos].mine){
            board[pos].mine = true;
            placed++;
        }
    }

    drawBoard();
}

function countMines(index){

    const row = Math.floor(index / SIZE);
    const col = index % SIZE;

    let count = 0;

    for(let dr=-1;dr<=1;dr++){
        for(let dc=-1;dc<=1;dc++){

            if(dr===0 && dc===0) continue;

            const r = row + dr;
            const c = col + dc;

            if(r>=0 && r<SIZE && c>=0 && c<SIZE){
                if(board[r*SIZE+c].mine){
                    count++;
                }
            }
        }
    }

    return count;
}

function moveMine(index){

    for(let i=0;i<board.length;i++){
        if(!board[i].mine && i !== index){
            board[i].mine = true;
            board[index].mine = false;
            return;
        }
    }
}

function floodFill(index){

    const stack = [index];

    while(stack.length){

        const current = stack.pop();

        if(board[current].revealed || board[current].flagged) continue;

        board[current].revealed = true;
        opened++;

        const mines = countMines(current);

        if(mines !== 0) continue;

        const row = Math.floor(current / SIZE);
        const col = current % SIZE;

        for(let dr=-1;dr<=1;dr++){
            for(let dc=-1;dc<=1;dc++){

                const r = row + dr;
                const c = col + dc;

                if(r>=0 && r<SIZE && c>=0 && c<SIZE){
                    const next = r*SIZE+c;

                    if(!board[next].revealed && !board[next].mine){
                        stack.push(next);
                    }
                }
            }
        }
    }
}

function reveal(index){

    if(gameOver) return;

    const cell = board[index];

    if(cell.revealed || cell.flagged) return;

    if(firstClick){
        firstClick = false;

        if(cell.mine){
            moveMine(index);
        }
    }

    if(cell.mine){

        gameOver = true;

        board.forEach(c=>{
            if(c.mine) c.revealed = true;
        });

        drawBoard();
        statusDiv.textContent = "💥 Game Over!";
        return;
    }

    floodFill(index);

    if(opened >= safeCells){
        gameOver = true;
        statusDiv.textContent = "🏆 Gewonnen!";
    }

    drawBoard();
}

function toggleFlag(index){

    if(gameOver) return;

    const cell = board[index];

    if(cell.revealed) return;

    cell.flagged = !cell.flagged;

    drawBoard();
}

function drawBoard(){

    boardDiv.innerHTML = "";

    board.forEach((cell,index)=>{

        const div = document.createElement("div");
        div.className = "cell";

        if(cell.revealed){

            div.classList.add("revealed");

            if(cell.mine){
                div.textContent = "💣";
            }else{
                const mines = countMines(index);
                if(mines > 0){
                    div.textContent = mines;
                    div.classList.add("n"+mines);
                }
            }
        }

        if(cell.flagged && !cell.revealed){
            div.textContent = "🚩";
            div.classList.add("flag");
        }

        div.addEventListener("click",()=>reveal(index));

        div.addEventListener("contextmenu",(e)=>{
            e.preventDefault();
            toggleFlag(index);
        });

        div.addEventListener("mouseenter",()=>{

            if(!cheat || gameOver || cell.revealed) return;

            if(cell.mine){
                div.classList.add("mineHint");
            }else{
                div.classList.add("safeHint");
            }
        });

        div.addEventListener("mouseleave",()=>{
            div.classList.remove("mineHint");
            div.classList.remove("safeHint");
        });

        boardDiv.appendChild(div);
    });
}

document.addEventListener("keydown",(e)=>{

    if(e.shiftKey && e.code === "Digit1"){
        cheat = !cheat;
    }
});

createBoard();
</script>

</body>
</html>!
