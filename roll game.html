<!DOCTYPE html>
<html>
<head>
  <title>🎲 Cosmic RNG Game - Full Version</title>
  <style>
    body { background: #0f0f1a; color: white; text-align: center; font-family: Arial; }
    button { padding: 10px 18px; font-size: 16px; margin: 3px; border-radius: 10px; cursor: pointer; border: none; }
    #result { font-size: 60px; margin: 20px; height: 80px; }
    #inventoryBox, #collectionBox { width: 360px; height: 200px; margin: 20px auto; overflow-y: scroll; border: 2px solid white; border-radius: 10px; padding: 10px; background: #1a1a2e; text-align: left; }
    .item { padding: 6px; margin: 3px; cursor: pointer; border-radius: 8px; }
    .item:hover { background: #333; }
    .selected { background: gold; color: black; }
  </style>
</head>
<body>

<h1>🎲 Cosmic RNG Game - Full Version</h1>

<button onclick="roll()">🎰 Roll</button>
<button onclick="sellSelected()">💰 Sell Selected</button><br>

<button onclick="selectAll()">✅ Select All</button>
<button onclick="selectTier('Common')">🟢 Common</button>
<button onclick="selectTier('Rare')">🔵 Rare</button>
<button onclick="selectTier('Epic')">🟣 Epic</button>
<button onclick="selectTier('Legendary')">🟡 Legendary</button>
<button onclick="selectTier('Cosmic')">🌌 Cosmic</button>
<div id="extraTierButtons"></div>

<div id="result">Roll!</div>

<h2>💵 Money: €<span id="money">0</span></h2>

<h3>🎒 Inventory</h3>
<div id="inventoryBox"></div>
<p id="selectedInfo">No items selected</p>

<h3>📖 Collection</h3>
<div id="collectionBox"></div>

<!-- Export/Import/Reset buttons -->
<br>
<input type="file" id="importFile" />
<button onclick="importProgress()">📂 Import Progress</button>
<button onclick="exportProgress()">💾 Export Progress</button>
<button onclick="resetProgress()">🧹 Reset Progress</button>

<script>
let money = 0;
let inventory = [];
let selectedItems = new Set();
let foundItems = {};
let rolling = false;

// Base 5 tiers + 20 Mythic tiers
const tiers = [
  { name:"Common", chance:0.5, color:"lightgreen", items:[{emoji:"🍎", value:1},{emoji:"🪨", value:2},{emoji:"🌿", value:3},{emoji:"🪵", value:4},{emoji:"🐟", value:5}] },
  { name:"Rare", chance:0.25, color:"lightblue", items:[{emoji:"💎", value:10},{emoji:"🔮", value:12},{emoji:"🧪", value:15},{emoji:"🗝️", value:18},{emoji:"📦", value:20}] },
  { name:"Epic", chance:0.15, color:"violet", items:[{emoji:"🐉", value:50},{emoji:"👑", value:60},{emoji:"⚔️", value:70},{emoji:"🛡️", value:80},{emoji:"💠", value:90}] },
  { name:"Legendary", chance:0.08, color:"gold", items:[{emoji:"🔥", value:120},{emoji:"🦄", value:150},{emoji:"🚀", value:180},{emoji:"🌋", value:220},{emoji:"⚡", value:250}] },
  { name:"Cosmic", chance:0.02, color:"cyan", items:[{emoji:"🌠", value:200},{emoji:"🪐", value:300},{emoji:"🌌", value:400},{emoji:"🕳️", value:500},{emoji:"👽", value:700}] }
];

// Add 20 Mythic tiers dynamically
for(let i=1;i<=20;i++){
  tiers.push({
    name:"Mythic"+i,
    chance: 0.0005 * (21-i),
    color: `hsl(${i*18}, 100%, 50%)`,
    items:[
      {emoji:"🌀", value:800+i*50},{emoji:"💫", value:850+i*50},{emoji:"🌟", value:900+i*50},{emoji:"⚡", value:950+i*50},{emoji:"☄️", value:1000+i*50}
    ]
  });
}

// Create buttons for Mythic tiers
const extraButtons = document.getElementById("extraTierButtons");
tiers.slice(5).forEach(t=>{
  const btn=document.createElement("button");
  btn.innerText=t.name;
  btn.style.background=t.color;
  btn.onclick=()=>selectTier(t.name);
  extraButtons.appendChild(btn);
});

// Load saved progress
window.onload = function(){
  const savedMoney = localStorage.getItem("money");
  if(savedMoney){ money=parseInt(savedMoney); document.getElementById("money").innerText = money; }
  const savedInventory = localStorage.getItem("inventory");
  if(savedInventory){ inventory=JSON.parse(savedInventory); updateInventory(); }
  const savedFound = localStorage.getItem("foundItems");
  if(savedFound){ foundItems=JSON.parse(savedFound); updateCollection(); }
};

// Save progress
function saveProgress(){
  localStorage.setItem("money", money);
  localStorage.setItem("inventory", JSON.stringify(inventory));
  localStorage.setItem("foundItems", JSON.stringify(foundItems));
}

// Roll
function roll(){
  if(rolling) return;
  rolling = true;
  const resultDiv = document.getElementById("result");

  let spin = setInterval(()=>{
    let allItems = tiers.flatMap(t=>t.items);
    let random = allItems[Math.floor(Math.random()*allItems.length)];
    resultDiv.innerHTML = random.emoji;
  }, 50);

  setTimeout(()=>{
    clearInterval(spin);
    let rng=Math.random(), cumulative=0, selectedTier;
    for(let t of tiers){ cumulative+=t.chance; if(rng<cumulative){ selectedTier=t; break; } }
    if(!selectedTier) selectedTier=tiers[0];

    let item = selectedTier.items[Math.floor(Math.random()*5)];
    item.tier = selectedTier.name;
    item.color = selectedTier.color;
    inventory.push(item);

    if(foundItems[item.emoji]){ foundItems[item.emoji].count++; }
    else { foundItems[item.emoji]={emoji:item.emoji,tier:item.tier,value:item.value,count:1}; }

    resultDiv.innerHTML = item.emoji+"<br><small>"+item.tier+"</small>";
    resultDiv.style.color = item.color;

    updateInventory();
    updateCollection();
    rolling = false;
    saveProgress();
  }, 800);
}

// Inventory functions
function updateInventory(){
  const box=document.getElementById("inventoryBox");
  box.innerHTML="";
  inventory.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML="#" + i + " — " + item.emoji + " (" + item.tier + ")";
    div.style.borderLeft="5px solid "+item.color;
    if(selectedItems.has(i)) div.classList.add("selected");
    div.onclick=()=>{ if(selectedItems.has(i)) selectedItems.delete(i); else selectedItems.add(i); updateInventory(); updateSelectedInfo(); };
    box.appendChild(div);
  });
}

function updateSelectedInfo(){
  if(selectedItems.size===0){ document.getElementById("selectedInfo").innerText="No items selected"; return; }
  let total=0; selectedItems.forEach(i=>total+=inventory[i].value);
  document.getElementById("selectedInfo").innerText="Selected "+selectedItems.size+" items | 💰 €"+total;
}

function sellSelected(){
  if(selectedItems.size===0){ alert("Select items first!"); return; }
  let total=0;
  let indices = Array.from(selectedItems).sort((a,b)=>b-a);
  indices.forEach(i=>{ total += inventory[i].value; inventory.splice(i,1); });
  money += total; selectedItems.clear();
  document.getElementById("money").innerText = money;
  updateInventory(); updateSelectedInfo(); saveProgress();
}

function selectAll(){ selectedItems.clear(); inventory.forEach((_,i)=>selectedItems.add(i)); updateInventory(); updateSelectedInfo(); }
function selectTier(tierName){ selectedItems.clear(); inventory.forEach((item,i)=>{ if(item.tier===tierName) selectedItems.add(i); }); updateInventory(); updateSelectedInfo(); }

// Collection
function updateCollection(){
  const box=document.getElementById("collectionBox");
  box.innerHTML="";
  const tierRank = {};
  tiers.forEach((t,i)=> tierRank[t.name] = i+1);

  const sortedItems = Object.values(foundItems).sort((a,b)=>{
    const rankA = tierRank[a.tier] || 0;
    const rankB = tierRank[b.tier] || 0;
    if(rankB !== rankA) return rankB - rankA;
    if(b.value !== a.value) return b.value - a.value;
    return a.emoji.localeCompare(b.emoji);
  });

  sortedItems.forEach(item=>{
    const div=document.createElement("div");
    div.innerHTML=item.emoji+" | "+item.tier+" | €"+item.value+" | Found: "+item.count;
    div.style.borderLeft="5px solid "+tiers.find(t=>t.name===item.tier).color;
    box.appendChild(div);
  });
}

// Export progress
function exportProgress() {
  const saveData = { money, inventory, foundItems };
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(saveData));
  const dlAnchor = document.createElement("a");
  dlAnchor.setAttribute("href", dataStr);
  dlAnchor.setAttribute("download", "RNGGame_Save.json");
  document.body.appendChild(dlAnchor);
  dlAnchor.click();
  dlAnchor.remove();
}

// Import progress
function importProgress() {
  const fileInput = document.getElementById("importFile");
  if(fileInput.files.length === 0) { alert("Choose a file to import!"); return; }
  const file = fileInput.files[0];
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = JSON.parse(e.target.result);
      money = data.money || 0;
      inventory = data.inventory || [];
      foundItems = data.foundItems || {};
      document.getElementById("money").innerText = money;
      updateInventory();
      updateCollection();
      saveProgress();
      alert("Progress imported successfully!");
    } catch(err){
      alert("Failed to import: Invalid file.");
    }
  };
  reader.readAsText(file);
}

// Reset progress
function resetProgress() {
  if(!confirm("Are you sure you want to reset all progress? This cannot be undone.")) return;

  localStorage.removeItem("money");
  localStorage.removeItem("inventory");
  localStorage.removeItem("foundItems");

  money = 0;
  inventory = [];
  selectedItems.clear();
  foundItems = {};

  document.getElementById("money").innerText = money;
  updateInventory();
  updateSelectedInfo();
  updateCollection();

  alert("All progress has been reset!");
}
</script>
</body>
</html>
