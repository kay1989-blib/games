<!DOCTYPE html>
<html>
<head>
<title>3D Spooky Roulette Table</title>
<style>
body { margin:0; overflow:hidden; background:#000033; } /* spooky night */
button {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 30px;
  font-size: 20px;
  z-index: 1;
}
</style>
</head>

<body>
<button onclick="spinGun()">Pull Trigger</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene()
scene.background = new THREE.Color(0x000033)
scene.fog = new THREE.FogExp2(0x000033, 0.05)

// Camera
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
)
camera.position.set(0, 8, 12)
camera.lookAt(0, 0, 0)

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth, window.innerHeight)
document.body.appendChild(renderer.domElement)

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.6)
scene.add(ambient)
const directional = new THREE.DirectionalLight(0xffffff, 0.8)
directional.position.set(10,20,10)
scene.add(directional)

// Floor
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x111122})
)
floor.rotation.x = -Math.PI/2
scene.add(floor)

// Table
const table = new THREE.Mesh(
  new THREE.CylinderGeometry(5,5,1,32),
  new THREE.MeshStandardMaterial({color:0x553311})
)
table.position.y = 0.5
scene.add(table)

// Gun with red loaded side
const gun = new THREE.Mesh(
  new THREE.BoxGeometry(2,0.4,0.6),
  [
    new THREE.MeshStandardMaterial({color:0x333333}), // right
    new THREE.MeshStandardMaterial({color:0xff0000}), // left = loaded side
    new THREE.MeshStandardMaterial({color:0x333333}), // top
    new THREE.MeshStandardMaterial({color:0x333333}), // bottom
    new THREE.MeshStandardMaterial({color:0x333333}), // front
    new THREE.MeshStandardMaterial({color:0x333333})  // back
  ]
)
gun.position.y = 1.2
scene.add(gun)

// Players
const players = []
for(let i=0;i<6;i++){
    const geo = new THREE.BoxGeometry(1,2,1)
    const mat = new THREE.MeshStandardMaterial({color:0x44aa88})
    const player = new THREE.Mesh(geo,mat)
    const angle = (i/6)*Math.PI*2
    player.position.x = Math.cos(angle)*7
    player.position.z = Math.sin(angle)*7
    player.position.y = 1
    player.userData.name = "Player "+(i+1)
    scene.add(player)
    players.push(player)
}

// Clickable player names
const raycaster = new THREE.Raycaster()
const mouse = new THREE.Vector2()
window.addEventListener('click', event=>{
    mouse.x = (event.clientX/window.innerWidth)*2 - 1
    mouse.y = -(event.clientY/window.innerHeight)*2 + 1
    raycaster.setFromCamera(mouse,camera)
    const intersects = raycaster.intersectObjects(players)
    if(intersects.length>0){
        const p = intersects[0].object
        const newName = prompt("Enter player name", p.userData.name)
        if(newName) p.userData.name = newName
    }
})

// Russian Roulette Logic
let chamber = Math.floor(Math.random()*6)
let current = 0
function spinGun(){
    const spin = Math.random()*10 + 10
    const target = gun.rotation.y + spin
    const interval = setInterval(()=>{
        gun.rotation.y += 0.2
        if(gun.rotation.y >= target){
            clearInterval(interval)
            const p = players[current]
            if(current === chamber){
                alert(`💥 BANG! ${p.userData.name} lost!`)
                p.material.color.set(0xff0000)
            }else{
                alert(`Click... ${p.userData.name} is safe.`)
            }
            current++
            if(current>5){
                current = 0
                chamber = Math.floor(Math.random()*6)
            }
        }
    },16)
}

// Animate
function animate(){
    requestAnimationFrame(animate)
    renderer.render(scene,camera)
}
animate()

// Handle resize
window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight
    camera.updateProjectionMatrix()
    renderer.setSize(window.innerWidth, window.innerHeight)
})
</script>

</body>
</html>
